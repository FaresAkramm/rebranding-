function UsersPanel(){
  const[users,setUsers]=useState([]);
  const[load,setLoad]=useState(true);
  React.useEffect(()=>{
    var fb=window.__fb;if(!fb)return;
    // Load from user_data (has WA) and fcm_tokens (has platform)
    Promise.all([
      fb.getDocs(fb.collection(fb.db,"user_data")),
      fb.getDocs(fb.collection(fb.db,"fcm_tokens"))
    ]).then(function(results){
      var userData={};
      results[0].docs.forEach(function(d){if(d.data().uid)userData[d.data().uid]=d.data();});
      var tokenData={};
      results[1].docs.forEach(function(d){if(d.data().uid)tokenData[d.data().uid]=d.data();});
      // merge
      var uids=new Set([...Object.keys(userData),...Object.keys(tokenData)]);
      var list=[];
      uids.forEach(function(uid){
        var u=Object.assign({},tokenData[uid]||{},userData[uid]||{});
        if(u.uid)list.push(u);
      });
      list.sort(function(a,b){return (b.updatedAt||"").localeCompare(a.updatedAt||"");});
      setUsers(list);setLoad(false);
    }).catch(function(){setLoad(false);});
  },[]);
  if(load)return <div style={{color:"var(--dim)",fontSize:".8rem",padding:"1rem"}}>جاري التحميل...</div>;
  if(!users.length)return <div style={{textAlign:"center",padding:"2rem",color:"var(--dim)"}}><div style={{fontSize:"2rem",marginBottom:".5rem"}}>👥</div><div>مفيش يوزرز لحد دلوقتي</div></div>;
  return(
    <div style={{display:"grid",gap:".55rem"}}>
      <div style={{fontSize:".7rem",color:"var(--dim)",marginBottom:".3rem"}}>{users.length} يوزر مسجل</div>
      {users.map(function(u,i){return(
        <div key={i} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:8,padding:".75rem 1rem",display:"flex",alignItems:"center",gap:".8rem"}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(212,165,116,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>👤</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:".85rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.displayName||"بدون اسم"}</div>
            <div style={{fontSize:".7rem",color:"var(--dim)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email||"—"}</div>
            {u.whatsapp&&<a href={"https://wa.me/"+u.whatsapp} target="_blank" rel="noreferrer" style={{fontSize:".7rem",color:"#25D366",display:"flex",alignItems:"center",gap:".2rem",marginTop:".15rem",textDecoration:"none"}}>واتساب: {u.whatsapp}</a>}
            <div style={{fontSize:".6rem",color:"var(--dim)",marginTop:".1rem"}}>{u.platform||"web"} {u.updatedAt?"· "+new Date(u.updatedAt).toLocaleDateString("ar-EG"):""}</div>
          </div>
          <button onClick={async function(){
            if(!window.confirm("تأكيد حذف: "+(u.displayName||u.email)+"?"))return;
            var fb=window.__fb;
            try{
              // delete all fcm tokens for this user
              var snap=await fb.getDocs(fb.collection(fb.db,"fcm_tokens"));
              for(var d of snap.docs){if(d.data().uid===u.uid)await fb.deleteDoc(fb.doc(fb.db,"fcm_tokens",d.id));}
              // delete user_data (favs + WA + nickname)
              try{await fb.deleteDoc(fb.doc(fb.db,"user_data",u.uid));}catch(e){}
              // delete user_favs (legacy)
              try{await fb.deleteDoc(fb.doc(fb.db,"user_favs",u.uid));}catch(e){}
              setUsers(function(prev){return prev.filter(function(x){return x.uid!==u.uid;});});
              msg("✅ تم حذف اليوزر");
            }catch(e){msg("❌ "+e.message);}
          }} style={{padding:".3rem .6rem",borderRadius:4,border:"1px solid rgba(239,68,68,.22)",background:"rgba(239,68,68,.06)",color:"#f87171",fontSize:".7rem",fontWeight:700,fontFamily:"'Cairo',sans-serif",flexShrink:0,minHeight:32}}>حذف</button>
        </div>
      );})}
    </div>
  );
}

            <Lbl t="المحتوى الكامل"/><textarea placeholder={"للطلبات: 01031751111\nالعنوان: ...\nhttps://maps.google.com/...\n\n• صينية - ١٢٩٩ ج"} value={of.content||""} onChange={e=>setOf({...of,content:e.target.value})} style={{...S.inp,minHeight:160,resize:"vertical",lineHeight:1.7}}/>
            <div style={{display:"flex",gap:".5rem",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowOF(false)} style={S.ghost}>إلغاء</button>
              <button className="bh" onClick={saveOff} disabled={busy} style={{...S.pBtn,opacity:busy?.6:1}}>{busy?"⏳ جاري...":"💾 حفظ"}</button>
            </div>
          </div>
        </div>
      )}

      {/* explain FAB removed — now in bottom nav */}

      {/* ── FOOTER ── */}
      <div style={{textAlign:"center",padding:"1.2rem",marginTop:".5rem"}}>
        <div className="made-by">Made by Fares Akram</div>
      </div>
      </>}
    </div>
  );
}

// Firebase compat loads sync - render immediately
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Offline Banner -->
<div id="offline-banner">⚠️ مفيش إنترنت — بتشوف آخر بيانات محملة</div>

<!-- Pull to Refresh -->
<div id="ptr"><span class="ptr-spin">↻</span> جاري التحديث...</div>

<script>
// Splash — full animation first ever open, fast after that
window.__hideSplash=function(){
  var s=document.getElementById('splash');
  if(s)s.classList.add('hidden');
};
window.addEventListener('load',function(){
  var seen=localStorage.getItem('rb_splash_seen');
  localStorage.setItem('rb_splash_seen','1');
  // Shorter delay - app renders fast now
  var delay=seen?400:1800;
  setTimeout(function(){
    window.__hideSplash();

  },delay);
});
// Offline
function updateOnline(){
  var b=document.getElementById('offline-banner');
  if(!b)return;
  navigator.onLine?b.classList.remove('show'):b.classList.add('show');
}
window.addEventListener('online',updateOnline);
window.addEventListener('offline',updateOnline);
updateOnline();
// Pull to Refresh
(function(){
  var ptr=document.getElementById('ptr'),startY=0,isPulling=false;
  document.addEventListener('touchstart',function(e){if(window.scrollY===0){startY=e.touches[0].clientY;isPulling=true;}},{passive:true});
  document.addEventListener('touchmove',function(e){if(!isPulling)return;if(e.touches[0].clientY-startY>30&&ptr)ptr.classList.add('visible')},{passive:true});
  document.addEventListener('touchend',function(e){if(!isPulling)return;isPulling=false;var diff=e.changedTouches[0].clientY-startY;if(ptr)ptr.classList.remove('visible');if(diff>80)window.location.reload();},{passive:true});
})();
// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
