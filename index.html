<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--primary:#0a0a0a;--hl:#d4a574;--hld:#b8915f;--text:#e8e8e8;--dim:#a8a8a8;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);}

/* ── Splash Screen ── */
#splash{position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:opacity .6s ease,visibility .6s ease;}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none;}
#splash .sp-ring{position:absolute;border-radius:50%;border:1px solid rgba(212,165,116,.08);animation:spRingPulse 3s ease-in-out infinite;}
#splash .sp-ring-1{width:200px;height:200px;animation-delay:0s;}
#splash .sp-ring-2{width:300px;height:300px;animation-delay:.4s;}
#splash .sp-ring-3{width:420px;height:420px;animation-delay:.8s;}
#splash .sp-logo-wrap{width:120px;height:120px;border-radius:50%;overflow:hidden;border:2.5px solid rgba(212,165,116,.5);box-shadow:0 0 40px rgba(212,165,116,.2),0 0 80px rgba(212,165,116,.08);animation:spLogoIn .8s ease forwards;opacity:0;position:relative;z-index:1;flex-shrink:0;background:#0a0a0a;}
#splash .sp-logo-wrap img{width:100%;height:100%;object-fit:cover;object-position:center;border-radius:50%;display:block;}
#splash .sp-title{font-family:'Playfair Display',serif;font-size:2rem;color:#e8e8e8;letter-spacing:.05em;margin-top:1.4rem;animation:spFadeUp .8s .3s ease forwards;opacity:0;position:relative;z-index:1;}
#splash .sp-sub{font-family:'Cairo',sans-serif;font-size:.6rem;color:#d4a574;letter-spacing:.35em;text-transform:uppercase;margin-top:.3rem;animation:spFadeUp .8s .5s ease forwards;opacity:0;position:relative;z-index:1;}
#splash .sp-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,165,116,.5),transparent);margin:.9rem 0;animation:spFadeUp .8s .6s ease forwards;opacity:0;position:relative;z-index:1;}
#splash .sp-dots{display:flex;gap:.5rem;animation:spFadeUp .8s .7s ease forwards;opacity:0;position:relative;z-index:1;}
#splash .sp-dot{width:5px;height:5px;border-radius:50%;background:#d4a574;animation:spDotBounce 1.4s ease-in-out infinite;}
#splash .sp-dot:nth-child(2){animation-delay:.15s;}
#splash .sp-dot:nth-child(3){animation-delay:.3s;}
@keyframes spRingPulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:.12;transform:scale(1.04);}}
@keyframes spLogoIn{0%{opacity:0;transform:scale(.7);}60%{transform:scale(1.05);}100%{opacity:1;transform:scale(1);}}
@keyframes spFadeUp{0%{opacity:0;transform:translateY(12px);}100%{opacity:1;transform:translateY(0);}}
@keyframes spDotBounce{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(-7px);opacity:1;}}
@keyframes dotBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

/* ── Bottom Nav (mobile only) ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(8,8,8,0.98);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid rgba(255,255,255,0.08);padding-bottom:env(safe-area-inset-bottom,0px);height:calc(62px + env(safe-area-inset-bottom,0px));}
.bottom-nav-inner{display:flex;height:62px;align-items:stretch;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--dim);font-family:'Cairo',sans-serif;font-size:.58rem;font-weight:600;transition:color .18s;position:relative;padding:0 4px;min-width:0;}
.bnav-btn.active{color:var(--hl);}
.bnav-btn .bnav-icon{font-size:1.3rem;line-height:1;}
.bnav-btn span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px;}
.bnav-badge{position:absolute;top:8px;right:calc(50% - 16px);background:#ef4444;color:#fff;font-size:.45rem;font-weight:700;padding:.1rem .28rem;border-radius:10px;min-width:14px;text-align:center;}
@media(max-width:768px){
  .bottom-nav{display:block;}
  .nav-bar{display:none!important;}
  body{padding-bottom:calc(64px + env(safe-area-inset-bottom,0px));}
  /* Landing mobile fixes */
  .land-page-wrap{padding:1.5rem 1.2rem!important;padding-top:calc(1.5rem + var(--safe-top))!important;}
  .land-logo-wrap{width:90px!important;height:90px!important;margin-bottom:1.2rem!important;}
  .hide-mobile{display:none!important;}
  /* Better touch targets */
  .land-btn{min-height:50px!important;font-size:.95rem!important;padding:.8rem 2rem!important;}
}

/* ── Pull to Refresh ── */
#ptr{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:center;height:0;overflow:hidden;background:rgba(10,10,10,.95);transition:height .2s ease;color:var(--hl);font-family:'Cairo',sans-serif;font-size:.8rem;gap:.5rem;}
#ptr.visible{height:50px;}
#ptr .ptr-spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Offline Banner ── */
#offline-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:500;background:#1a0a0a;border-bottom:1px solid rgba(239,68,68,.3);color:#fca5a5;font-family:'Cairo',sans-serif;font-size:.78rem;text-align:center;padding:.5rem;padding-top:calc(.5rem + env(safe-area-inset-top,0px));}
#offline-banner.show{display:block;}

/* ── Base ── */
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{font-family:'Cairo','Work Sans',sans-serif;direction:rtl;background:var(--primary);min-height:100vh;min-height:-webkit-fill-available;color:var(--text);position:relative;overflow-x:hidden;cursor:none;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 50%,rgba(212,165,116,0.05),transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,165,116,0.03),transparent 50%);pointer-events:none;z-index:0;}

/* ── Custom Cursor (desktop only) ── */
#cursor,#cursor-ring{display:none;}
@media(pointer:fine){
  body{cursor:none;}
  a,button,label,[role="button"]{cursor:none;}
  input,select,textarea{cursor:text;}
  #cursor{display:block;position:fixed;width:10px;height:10px;background:var(--hl);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .18s,height .18s;mix-blend-mode:difference;}
  #cursor-ring{display:block;position:fixed;width:32px;height:32px;border:1.5px solid rgba(212,165,116,0.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}
  #cursor.ck{width:7px;height:7px;}
  #cursor-ring.ck{width:24px;height:24px;}
}

.bh{transition:opacity .18s;}.bh:hover{opacity:.8;}
input,select,textarea{outline:none;font-family:'Cairo',sans-serif;-webkit-appearance:none;border-radius:6px;font-size:max(.9rem,16px);}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 28px rgba(212,165,116,0.2),0 0 56px rgba(212,165,116,0.05)}50%{box-shadow:0 0 46px rgba(212,165,116,0.32),0 0 90px rgba(212,165,116,0.09)}}
@keyframes floatUp{from{opacity:0;transform:translateY(36px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes skelPulse{0%,100%{opacity:.35}50%{opacity:.6}}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── Page transitions ── */
.page-enter{animation:pageIn .32s ease both;}

/* ── Cards ── */
.card{transition:transform .22s,box-shadow .22s,border-color .22s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
@media(hover:hover){.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.52);border-color:var(--hl)!important;}}

/* ── Skeleton ── */
.skel{background:rgba(255,255,255,0.05);border-radius:6px;animation:skelPulse 1.5s ease-in-out infinite;}

/* ── Upload ── */
.upbtn{display:flex;align-items:center;justify-content:center;gap:.45rem;width:100%;padding:.56rem 1rem;border-radius:8px;border:1.5px dashed rgba(212,165,116,0.3);background:rgba(212,165,116,0.03);color:var(--hl);font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:600;margin-bottom:.5rem;transition:all .2s;min-height:44px;}
.upbtn:hover{border-color:var(--hl);background:rgba(212,165,116,0.07);}
.pbar{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:.55rem;overflow:hidden;}
.pbar-in{height:100%;background:var(--hl);transition:width .3s;}

/* ── Copy btn ── */
.cpbtn{display:inline-flex;align-items:center;gap:.28rem;padding:.32rem .8rem;border-radius:6px;border:1px solid rgba(212,165,116,0.22);background:rgba(212,165,116,0.05);color:var(--hl);font-family:'Cairo',sans-serif;font-size:.74rem;font-weight:600;transition:all .18s;min-height:36px;white-space:nowrap;}
.cpbtn:hover{border-color:var(--hl);background:rgba(212,165,116,0.12);}
.cpbtn.done{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,0.07);}
.cpbtn.sm{padding:.22rem .58rem;font-size:.68rem;min-height:30px;}

/* ── Gallery ── */
.gimg{width:100%;height:110px;object-fit:cover;border-radius:6px;border:1px solid var(--border);transition:transform .2s,border-color .2s;}
@media(hover:hover){.gimg:hover{transform:scale(1.03);border-color:var(--hl);}}
.exp-urgent{animation:pulse 1.5s ease-in-out infinite;}

/* ── Search ── */
.search-wrap{position:relative;flex:1;max-width:340px;}
.search-wrap input{width:100%;padding:0.48rem 1rem 0.48rem 2.4rem;border-radius:22px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text);font-family:'Cairo',sans-serif;font-size:max(0.85rem,16px);direction:rtl;min-height:42px;transition:border-color .2s;}
.search-wrap input:focus{border-color:rgba(212,165,116,0.42);}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--dim);font-size:.8rem;pointer-events:none;}

/* ── FAB ── */
.explain-fab{position:fixed;bottom:calc(1.2rem + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:.48rem;padding:.58rem 1.3rem;border-radius:30px;border:1px solid rgba(212,165,116,0.3);background:rgba(10,10,10,0.94);color:var(--hl);font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:700;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 4px 24px rgba(0,0,0,.5);transition:all .22s;white-space:nowrap;min-height:42px;}

/* ── Explain modal ── */
.explain-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:1rem;margin-bottom:.75rem;}
.explain-section h3{color:var(--hl);font-size:.82rem;font-weight:700;margin-bottom:.55rem;letter-spacing:.05em;}
.explain-section p,.explain-section li{font-size:.82rem;color:var(--dim);line-height:1.75;}
.explain-section ul{padding-right:1.2rem;}
.explain-section li{margin-bottom:.28rem;}

/* ── Undo toast ── */
.undo-toast{position:fixed;bottom:calc(4.5rem + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#181818;border:1px solid rgba(212,165,116,0.22);color:var(--text);padding:.55rem 1rem;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.8rem;display:flex;align-items:center;gap:.65rem;z-index:998;animation:slideUp .22s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}

/* ── Made by ── */
.made-by{font-family:'Playfair Display',serif;font-size:.8rem;font-weight:600;background:linear-gradient(90deg,#b8915f,#d4a574,#f0dbb5,#d4a574,#b8915f);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;animation:shimmer 3s linear infinite;}

/* ── Landing ── */
.land-logo{animation:glowPulse 3s ease-in-out infinite;}
.land-ring{position:absolute;border-radius:50%;border:1px solid rgba(212,165,116,0.06);pointer-events:none;}
.land-btn-primary{padding:.85rem 2rem;border-radius:10px;border:none;font-weight:700;font-family:'Cairo',sans-serif;font-size:1rem;background:var(--hl);color:#0a0a0a;transition:all .22s;letter-spacing:.03em;min-height:50px;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.land-animate-1{animation:fadeInScale .7s cubic-bezier(.22,1,.36,1) both;}
.land-animate-2{animation:fadeInUp .7s .15s cubic-bezier(.22,1,.36,1) both;}
.land-animate-3{animation:fadeInUp .7s .3s cubic-bezier(.22,1,.36,1) both;}
.land-animate-4{animation:fadeInUp .7s .45s cubic-bezier(.22,1,.36,1) both;}
.land-animate-5{animation:fadeInUp .7s .6s cubic-bezier(.22,1,.36,1) both;}

<script>
(function(){
  const canvas=document.getElementById('particles-canvas');
  if(!canvas)return;
  // Disable particles on mobile to save battery
  if(window.innerWidth<640){canvas.style.display='none';return;}
  const ctx=canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a);}
  for(let i=0;i<55;i++){pts.push({x:rand(0,1),y:rand(0,1),vx:rand(-.12,.12),vy:rand(-.08,.08),r:rand(.8,2.2),o:rand(.15,.5)});}
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx/W*1.2;p.y+=p.vy/H*1.2;
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;
      if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(212,165,116,${p.o})`;ctx.fill();
    });
    // draw faint connecting lines
    for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){
      const dx=(pts[i].x-pts[j].x)*W,dy=(pts[i].y-pts[j].y)*H;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<110){ctx.beginPath();ctx.moveTo(pts[i].x*W,pts[i].y*H);ctx.lineTo(pts[j].x*W,pts[j].y*H);ctx.strokeStyle=`rgba(212,165,116,${.06*(1-dist/110)})`;ctx.lineWidth=.6;ctx.stroke();}
    }}
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

/* ── Copy btn ── */
function CopyBtn({text,label,small}){
  const[ok,setOk]=useState(false);
  function copy(e){e&&e.stopPropagation();navigator.clipboard.writeText(text||"").then(()=>{setOk(true);setTimeout(()=>setOk(false),2000);}).catch(()=>{});}
  return <button className={"cpbtn"+(ok?" done":"")+(small?" sm":"")} onClick={copy}>{ok?"✅ تم":"📋 "+(label||"كوبي")}</button>;
}

/* ── Image Upload ── */
function ImgUp({label,cur,onDone}){
  const[prev,setPrev]=useState(cur||"");const[pct,setPct]=useState(0);const[busy,setBusy]=useState(false);const fref=useRef();
  async function pick(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();reader.onload=ev=>setPrev(ev.target.result);reader.readAsDataURL(f);
    setBusy(true);setPct(30);
    try{const url=await uploadToCloudinary(f);setPct(100);setPrev(url);onDone(url);}
    catch(err){msg("❌ فشل الرفع: "+err.message);}
    setBusy(false);setPct(0);
  }
  return(
    <div>
      <Lbl t={label}/>
      {prev&&<img src={prev} style={{width:"100%",height:80,objectFit:"cover",borderRadius:6,marginBottom:6,border:"1px solid var(--border)"}} alt=""/>}
      {busy&&<div className="pbar"><div className="pbar-in" style={{width:pct+"%"}}/></div>}
      <label className="upbtn">{busy?"⏳ جاري الرفع...":"☁️ ارفع صورة"}<input ref={fref} type="file" accept="image/*" style={{display:"none"}} onChange={pick} disabled={busy}/></label>
      <div style={{textAlign:"center",fontSize:".68rem",color:"var(--dim)",margin:"-2px 0 4px"}}>أو رابط مباشر</div>
      <input placeholder="https://..." value={prev} onChange={e=>{setPrev(e.target.value);onDone(e.target.value);}} style={S.inp}/>
    </div>
  );
}

/* ── Gallery Upload ── */
function GalleryUp({images,onChange}){
  const[busy,setBusy]=useState(false);const[prog,setProg]=useState("");const fref=useRef();
  async function pick(e){
    const files=[...e.target.files];if(!files.length)return;
    setBusy(true);const newUrls=[];
    for(let i=0;i<files.length;i++){setProg(`رفع ${i+1} من ${files.length}...`);try{const url=await uploadToCloudinary(files[i]);newUrls.push(url);}catch(err){}}
    onChange([...(images||[]),...newUrls]);setBusy(false);setProg("");fref.current.value="";
  }
  function remove(i){onChange((images||[]).filter((_,idx)=>idx!==i));}
  return(
    <div>
      <Lbl t="صور المنيو / الألبوم"/>
      {(images||[]).length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:".4rem",marginBottom:".6rem"}}>
          {(images||[]).map((url,i)=>(
            <div key={i} style={{position:"relative"}}>
              <img src={url} className="gimg" alt=""/>
              <button onClick={()=>remove(i)} style={{position:"absolute",top:3,left:3,background:"rgba(239,68,68,0.85)",border:"none",color:"#fff",width:22,height:22,borderRadius:"50%",fontSize:".72rem",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
          ))}
        </div>
      )}
      {busy&&<div style={{fontSize:".75rem",color:"var(--hl)",marginBottom:".4rem",textAlign:"center"}}>☁️ {prog}</div>}
      <label className="upbtn">{busy?prog:"📁 ارفع صور (متعددة)"}<input ref={fref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={pick} disabled={busy}/></label>
    </div>
  );
}

window.askGemini=async function askGemini(sysprompt,history,maxTok){
  async function doRequest(prompt,hist,tok){
    var msgs=[{role:"system",content:prompt}];
    hist.forEach(function(m){msgs.push({role:m.r==="user"?"user":"assistant",content:m.t});});
    var model=prompt.includes("Available information about [")?"meta-llama/llama-4-maverick-17b-128e-instruct":"meta-llama/llama-4-scout-17b-16e-instruct";
  var res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},body:JSON.stringify({model:model,messages:msgs,max_tokens:tok||500,temperature:0})});
    if(!res.ok){var e=await res.json();throw new Error(e&&e.error&&e.error.message||"error");}
    var d=await res.json();
    return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||"";
  }
  for(var attempt=0;attempt<3;attempt++){
    try{
      var result=await doRequest(sysprompt,history,maxTok);
      if(result)return result;
    }catch(e){
      if(e.message&&(e.message.includes("too large")||e.message.includes("tokens")||e.message.includes("limit"))){
        var shortPrompt=sysprompt.slice(0,3000);
        try{return await doRequest(shortPrompt,history.slice(-1),400);}catch(e2){}
      }
      if(attempt===2)return "[UNANSWERED] فشل الاتصال، حاول تاني";
      await new Promise(function(res){setTimeout(res,1000*(attempt+1));});
    }
  }
  return "[UNANSWERED] فشل الاتصال، حاول تاني";
}

  'Q: "أقرب عرض هينتهي إمتى؟" — عام → قارن تواريخ الانتهاء وارد.',
].join("\n");

function buildContext(accs,offs){
  var activeOffs=offs.filter(function(o){return !isExp(o.expiryDate);});
  var parts=[SYSTEM_BASE,"","الأكونتات: "+accs.map(function(a){return a.name;}).join(" | ")];
  if(activeOffs.length>0){
    parts.push("العروض النشطة:");
    activeOffs.slice(0,12).forEach(function(o){
      var acc=accs.find(function(a){return a.id===o.accountId;});
      var line="- "+o.title+(acc?" ("+acc.name+")":"");
      if(o.description)line+=" — "+o.description;
      parts.push(line);
    });
  }
  return parts.join("\n");
}


function fuzzyMatch(str,target){
  // Check if str contains target or target contains str (partial match)
  var s=str.toLowerCase().trim();
  var t=target.toLowerCase().trim();
  if(s.includes(t)||t.includes(s))return true;
  // Check word by word
  var words=t.split(/\s+/);
  var matched=words.filter(function(w){return w.length>2&&s.includes(w);});
  return matched.length>=Math.ceil(words.length*0.6);
}

function buildSmartContext(userText,accs,offs){
  var lower=userText.toLowerCase();
  var matched=null;
  var bestScore=0;

  accs.forEach(function(a){
    var score=0;
    if(lower.includes(a.name.toLowerCase()))score+=10;
    else if(fuzzyMatch(lower,a.name))score+=6;
    (a.tags||[]).forEach(function(tag){if(tag&&lower.includes(tag.toLowerCase()))score+=3;});
    offs.filter(function(o){return o.accountId===a.id&&!isExp(o.expiryDate);}).forEach(function(o){
      if(o.title&&fuzzyMatch(lower,o.title))score+=4;
    });
    if(score>bestScore){bestScore=score;matched=a;}
  });

  // لو لقينا أكونت — ابعت context مخصص بكل تفاصيله
  if(bestScore>0&&matched){
    return {ctx:buildAccContext(matched,offs),matched:matched};
  }

  // مفيش match — ابعت كل الأكونتات بتفاصيلها كاملة
  // لو أكونتات كتير نضغط عشان متعداش الـ tokens
  var allCtx=buildFullContext(accs,offs);
  return {ctx:allCtx,matched:null};
}

function buildFullContext(accs,offs){
  var activeOffs=offs.filter(function(o){return !isExp(o.expiryDate);});
  // Sort by expiry to help answer "أقرب عرض هينتهي"
  var sortedOffs=activeOffs.slice().sort(function(a,b){
    if(!a.expiryDate)return 1;
    if(!b.expiryDate)return -1;
    return a.expiryDate.localeCompare(b.expiryDate);
  });
  var parts=[
    SYSTEM_BASE,
    "",
    "ملاحظة مهمة: OFFER EXPIRY = آخر يوم للعرض. WORKING HOURS = مواعيد العمل اليومية. مختلفين تماماً.",
    "",
    "الأكونتات والعروض:"
  ];
  accs.forEach(function(a){
    var ao=sortedOffs.filter(function(o){return o.accountId===a.id;});
    var line="【"+a.name+"】";
    if(a.status&&a.status!=="نشط")line+=" ("+a.status+")";
    if(a.timesReply)line+="\n  المواعيد: "+a.timesReply.slice(0,80);
    if(a.contactReply)line+="\n  التواصل: "+a.contactReply.slice(0,60);
    if(ao.length>0){
      line+="\n  العروض: "+ao.map(function(o){
        var s=o.title;
        if(o.expiryDate)s+=" (ينتهي: "+fmtDate(o.expiryDate)+")";
        return s;
      }).join(" / ");
    } else {
      line+="\n  العروض: مفيش عروض نشطة";
    }
    // Add trained Q&A — كامل مش ملخص
    var tqa=(a.trainedQA||[]).filter(function(q){return q.q&&q.a;});
    if(tqa.length>0){
      line+="\n  أسئلة وأجوبة:\n"+tqa.map(function(q){return "    Q: "+q.q+"\n    A: "+q.a;}).join("\n");
    }
    parts.push(line);
  });
  return parts.join("\n");
}




function buildAccContext(a,offs){
  var ao=offs.filter(function(o){return o.accountId===a.id&&!isExp(o.expiryDate);});
  var tqa=(a.trainedQA||[]).filter(function(q){return q.q&&q.a;});
  var parts=[
    SYSTEM_BASE,
    "",
    "Available information about ["+a.name+"] ONLY — do not add anything else:",
    "━━━━━━━━━━━━━━━━━━━━"
  ];
  parts.push("IMPORTANT: 'OFFER EXPIRY' = last date offer is valid. 'WORKING HOURS' = daily open/close times. Never confuse them.");
  if(a.description)parts.push("Description: "+a.description);
  if(a.fixedReply)parts.push("【Fixed Reply — copy as-is】\n"+a.fixedReply);
  if(a.timesReply)parts.push("【WORKING HOURS (مواعيد العمل اليومية) — copy as-is】\n"+a.timesReply);
  if(a.contactReply)parts.push("【Contact Info — copy as-is】\n"+a.contactReply);
  (a.extraReplies||[]).filter(function(r){return r.text;}).forEach(function(r){
    parts.push("【"+r.label+"】\n"+r.text);
  });
  if(ao.length>0){
    parts.push("【Offers】— copy requested offer WORD FOR WORD:");
    ao.forEach(function(o,idx){
      var block="[OFFER "+(idx+1)+"] "+o.title;
      if(o.badge)block+=" ("+o.badge+")";
      if(o.description)block+="\n"+o.description;
      if(o.content)block+="\n"+o.content;
      if(o.expiryDate)block+="\nOFFER-EXPIRY-DATE (آخر يوم للعرض): "+fmtDate(o.expiryDate);
      if(o.link)block+="\n"+o.link;
      parts.push(block);
    });
  }
  if(tqa.length>0){
    parts.push("【Trained Q&A — use these answers directly】");
    tqa.forEach(function(q){parts.push("Q: "+q.q+"\nA: "+q.a);});
  }
  return parts.join("\n");
}

  "- بعد الـ [ACTION] اكتب رد قصير بالعربي يوضح إيه اللي عملته.",
].join("\n");

function buildAdminContext(accs,offs){
  var parts=[ADMIN_SYSTEM,"","=== الأكونتات ==="];
  accs.forEach(function(a){
    var ao=offs.filter(function(o){return o.accountId===a.id&&!isExp(o.expiryDate);});
    parts.push("[ID:"+a.id+"] "+a.name+" ("+(a.category||"—")+" — "+(a.status||"نشط")+")");
    if(ao.length>0)parts.push("  عروضه: "+ao.map(function(o){return "[ID:"+o.id+"] "+o.title;}).join(" | "));
  });
  return parts.join("\n");
}

window.parseAndExecAction=async function parseAndExecAction(actionStr,accs,offs,onDone){
  try{
    var parsed=JSON.parse(actionStr);
    var fb=window.__fb;
    var t=parsed.type;
    if(t==="add_offer"){
      var acc=accs.find(function(a){return a.id===parsed.accountId;});
      if(!acc){onDone(false,"مش لاقي الأكونت");return;}
      var id="off_"+Date.now();
      await fb.setDoc(fb.doc(fb.db,"offers",id),{
        id:id,accountId:parsed.accountId,title:parsed.title||"",
        description:parsed.description||"",content:parsed.content||"",
        image:"",link:"",expiryDate:parsed.expiryDate||"",
        badge:parsed.badge||"جديد",updatedAt:new Date().toISOString()
      });
      onDone(true,"✅ تم إضافة العرض: "+parsed.title+" لـ "+acc.name);logActivity("add_offer","إضافة عرض: "+parsed.title,"الأكونت: "+acc.name);
    }
    else if(t==="edit_offer"){
      var off=offs.find(function(o){return o.id===parsed.offerId;});
      if(!off){onDone(false,"مش لاقي العرض");return;}
      await fb.setDoc(fb.doc(fb.db,"offers",off.id),Object.assign({},off,parsed.changes||{},{ updatedAt:new Date().toISOString()}));
      onDone(true,"✅ تم تعديل العرض: "+off.title);logActivity("edit_offer","تعديل عرض: "+off.title,"");
    }
    else if(t==="delete_offer"){
      var off2=offs.find(function(o){return o.id===parsed.offerId;});
      await fb.deleteDoc(fb.doc(fb.db,"offers",parsed.offerId));
      onDone(true,"🗑️ تم حذف العرض: "+(off2?off2.title:parsed.offerId));logActivity("delete_offer","حذف عرض: "+(off2?off2.title:""),"");
    }
    else if(t==="edit_account"){
      var acc2=accs.find(function(a){return a.id===parsed.accountId;});
      if(!acc2){onDone(false,"مش لاقي الأكونت");return;}
      await fb.setDoc(fb.doc(fb.db,"accounts",acc2.id),Object.assign({},acc2,parsed.changes||{},{ updatedAt:new Date().toISOString()}));
      onDone(true,"✅ تم تعديل بيانات "+acc2.name);logActivity("edit_account","تعديل أكونت: "+acc2.name,JSON.stringify(parsed.changes||{}).slice(0,80));
    }
    else if(t==="add_reply"){
      var acc3=accs.find(function(a){return a.id===parsed.accountId;});
      if(!acc3){onDone(false,"مش لاقي الأكونت");return;}
      var replies=(acc3.extraReplies||[]).concat([{label:parsed.label||"رد جديد",text:parsed.text||""}]);
      await fb.setDoc(fb.doc(fb.db,"accounts",acc3.id),Object.assign({},acc3,{extraReplies:replies,updatedAt:new Date().toISOString()}));
      onDone(true,"✅ تم إضافة الرد: "+parsed.label+" لـ "+acc3.name);logActivity("add_reply","إضافة رد: "+parsed.label,"الأكونت: "+acc3.name);
    }
    else if(t==="change_status"){
      var acc4=accs.find(function(a){return a.id===parsed.accountId;});
      if(!acc4){onDone(false,"مش لاقي الأكونت");return;}
      await fb.setDoc(fb.doc(fb.db,"accounts",acc4.id),Object.assign({},acc4,{status:parsed.status,updatedAt:new Date().toISOString()}));
      onDone(true,"✅ تم تغيير حالة "+acc4.name+" إلى "+parsed.status);
    }
    else if(t==="add_info"){
      var acc5=accs.find(function(a){return a.id===parsed.accountId;});
      if(!acc5){onDone(false,"مش لاقي الأكونت");return;}
      var existing5=(acc5.trainedQA||[]);
      var isDup5=existing5.find(function(x){return x.q&&x.q.trim()===(parsed.question||"").trim();});
      var newQA5=isDup5
        ? existing5.map(function(x){return x.q.trim()===parsed.question.trim()?{q:x.q,a:parsed.answer}:x;})
        : [...existing5,{q:parsed.question,a:parsed.answer}];
      var updated5=Object.assign({},acc5,{trainedQA:newQA5,updatedAt:new Date().toISOString()});
      try{await fb.setDoc(fb.doc(fb.db,"accounts",acc5.id),updated5);onDone(true,"✅ تم إضافة المعلومة لـ "+acc5.name);logActivity("add_info","إضافة معلومة","الأكونت: "+acc5.name+" | السؤال: "+(parsed.question||"").slice(0,50));}
      catch(e){onDone(false,"❌ "+e.message);}
    }
    else{onDone(false,"أكشن مش معروف: "+t);}
  }catch(e){onDone(false,"❌ خطأ: "+e.message);}
}

function QAnswerRow({item,onSave,onDelete,idx}){
  const[ans,setAns]=useState(item.a||"");
  const[saving,setSaving]=useState(false);
  const[done,setDone]=useState(false);
  async function doSave(){
    if(!ans.trim())return;
    setSaving(true);
    await onSave(item,ans,idx);
    setDone(true);
    setSaving(false);
  }
  if(done)return <div style={{fontSize:".68rem",color:"#4ade80",fontWeight:700}}>✅ تم الحفظ!</div>;
  return(
    <div style={{display:"flex",gap:".3rem"}}>
      <input
        placeholder="اكتب الإجابة هنا..."
        value={ans}
        onChange={e=>setAns(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")doSave();}}
        style={{flex:1,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",color:"var(--text)",borderRadius:4,padding:".28rem .5rem",fontFamily:"Cairo,sans-serif",fontSize:".7rem",direction:"rtl"}}
      />
      {ans.trim()&&<button onClick={doSave} disabled={saving} style={{background:"var(--hl)",color:"#0a0a0a",border:"none",borderRadius:4,padding:".28rem .55rem",fontSize:".7rem",fontWeight:700,cursor:"pointer",fontFamily:"Cairo,sans-serif",whiteSpace:"nowrap"}}>{saving?"⏳":"💾"}</button>}
      <button onClick={()=>onDelete(item)} title="حذف السؤال" style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",color:"#f87171",borderRadius:4,padding:".28rem .45rem",fontSize:".75rem",cursor:"pointer"}}>🗑</button>
    </div>
  );
}

window.requestNotifPermission=async function requestNotifPermission(){
  if(!("Notification" in window))return false;
  if(Notification.permission==="granted")return true;
  if(Notification.permission==="denied"){
    // Guide user to browser settings
    var isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
    var isAndroid=/Android/.test(navigator.userAgent);
    if(isIOS){
      alert("افتح: الإعدادات ← Safari ← الإشعارات وفعّلها");
    } else if(isAndroid){
      alert("افتح: إعدادات الجهاز ← التطبيقات ← المتصفح ← الإشعارات وفعّلها");
    } else {
      alert("افتح إعدادات المتصفح وفعّل الإشعارات لهذا الموقع");
    }
    return false;
  }
  const p=await Notification.requestPermission();
  return p==="granted";
}

window.showLocalNotif=function showLocalNotif(title,body,icon){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  try{
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification(title,{body,icon:icon||"https://res.cloudinary.com/diepkkeyu/image/upload/v1773517119/404042723_763352762472137_4889753537613967821_n_p3hhjh.jpg",dir:"rtl",lang:"ar",vibrate:[200,100,200]});

    } else {

    }
  }catch(e){}
}

window.registerFCMToken=async function registerFCMToken(){
  try{
    var fb=window.__fb;

    const perm=await Notification.requestPermission();
    if(perm!=="granted")return;
    const token=await fb.getToken(fb.messaging,{vapidKey:FCM_VAPID});

    // حفظ الـ token — لو فيه user مسجل يتحفظ بـ uid، غير كده بـ token
    var uid=window.__currentUser?window.__currentUser.uid:null;
    var docId=uid?"user_"+uid+"_fcm":token;
    await fb.setDoc(fb.doc(fb.db,"fcm_tokens",docId),{
      token,uid:uid||null,
      email:window.__currentUser?window.__currentUser.email||"":null,
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString(),
      platform:navigator.userAgent.includes("Mobile")?"mobile":"desktop"
    });
    // استمع للـ messages وهو مفتوح
    fb.onMessage(fb.messaging,function(payload){
      const {title,body}=payload.notification||{};
      if(title)window.showLocalNotif(title,body||"");
    });
    return token;
  }catch(e){}
}

// استمع للـ notifications — exposed on window so Babel can call it
window.listenToNotifications=async function(){
  try{
    var fb=window.__fb;if(!fb)return;
    var lastCheck=localStorage.getItem("rb_last_notif")||new Date(Date.now()-60000).toISOString();
    fb.onSnapshot(
      fb.query(fb.collection(fb.db,"notifications"),fb.orderBy("createdAt","desc"),fb.limit(5)),
      function(snap){
        snap.docs.forEach(function(d){
          var n=d.data();
          if(n.createdAt<=lastCheck)return;
          // check if user follows this account (or it's a general notification)
          var favs=[];
          try{favs=JSON.parse(localStorage.getItem("rb_favs")||"[]");}catch(e){}
          var shouldShow=!n.accId||favs.length===0||favs.includes(n.accId);
          if(shouldShow){
            window.showLocalNotif(n.title,n.body||"");
          }
          localStorage.setItem("rb_last_notif",n.createdAt);
        });
      }
    );
  }catch(e){}
};

  async function deleteQ(item){
    var fb=window.__fb;
    try{
      await fb.deleteDoc(fb.doc(fb.db,"unanswered_questions",item.id));
    }catch(e){console.error(e);}
  }

  async function answerSavedQ(item,ans,idx){
    var fb=window.__fb;if(!fb)return;
    var matched=accs.find(function(a){return a.name===item.accName;})||
                accs.find(function(a){return (item.q||"").includes(a.name);});
    if(!matched)matched=accs.slice().sort(function(a,b){
      return offs.filter(function(o){return o.accountId===b.id;}).length -
             offs.filter(function(o){return o.accountId===a.id;}).length;
    })[0];
    if(!matched)return;
    var existing=(matched.trainedQA||[]);
    var isDup=existing.find(function(x){return x.q.trim()===item.q.trim();});
    var newQA=isDup
      ? existing.map(function(x){return x.q.trim()===item.q.trim()?{q:x.q,a:ans}:x;})
      : [...existing,{q:item.q,a:ans}];
    try{
      await fb.setDoc(fb.doc(fb.db,"accounts",matched.id),Object.assign({},matched,{trainedQA:newQA,updatedAt:new Date().toISOString()}));
      await fb.deleteDoc(fb.doc(fb.db,"unanswered_questions",item.id));
    }catch(e){msg("❌ "+e.message);}
  }
  async function send(){
    const txt=input.trim();if(!txt||loading)return;

    // Rate limiting: max 10 msgs per minute
    var now=Date.now();
    if(now-lastMsgTimeRef.current<60000){
      msgCountRef.current++;
      if(msgCountRef.current>10){
        setInput("");
        setMsgs(function(p){return [...p,{r:"user",t:txt},{r:"ai",t:"⚠️ بعتلنا كتير شوية! استنى دقيقة وجرب تاني 😅"}];});
        return;
      }
    } else {
      msgCountRef.current=1;
      lastMsgTimeRef.current=now;
    }

    // Duplicate detection
    if(isDuplicate(txt,msgs)){
      setInput("");
      setTimeout(function(){
        setMsgs(function(p){return [...p,{r:"user",t:txt},{r:"ai",t:"🤔 سألت نفس السؤال قبل كده! لو مش لاقي الإجابة تواصل مع الأدمن على واتساب 👇\nhttps://wa.me/"+WA}];});
      },500);
      return;
    }

    setInput("");
    const hist=[...msgs,{r:"user",t:txt}];
    setMsgs(hist);
    setTyping(true);
    setLoading(true);

    try{
      var matched=null;
      var activeCtx="";

      // البحث في الـ trainedQA مباشرة قبل الـ AI
      function searchTrainedQA(question){
        var lower=question.toLowerCase().trim();
        var bestMatch=null;
        var bestScore=0;
        accs.forEach(function(a){
          (a.trainedQA||[]).filter(function(q){return q.q&&q.a;}).forEach(function(qa){
            var qLower=qa.q.toLowerCase().trim();
            var score=0;
            if(qLower===lower)score=100;
            else if(qLower.includes(lower)||lower.includes(qLower))score=70;
            else{
              var words=lower.split(/\s+/).filter(function(w){return w.length>2;});
              var matched=words.filter(function(w){return qLower.includes(w);});
              score=matched.length>0?(matched.length/words.length)*50:0;
            }
            if(score>bestScore&&score>=40){bestScore=score;bestMatch={q:qa.q,a:qa.a,accName:a.name};}
          });
        });
        return bestMatch;
      }
      var directMatch=searchTrainedQA(txt);
      if(directMatch){
        setTyping(false);
        setMsgs([...hist,{r:"ai",t:directMatch.a}]);
        setLoading(false);
        return;
      }

      if(lockedAcc){
        // وضع الأكونت المقفول — دايماً نبعت context الأكونت ده بس
        matched=lockedAcc;
        activeCtx=buildAccContext(lockedAcc,offs);
      } else if(botMode==="general"){
        // وضع السؤال العام — كل الداتا
        activeCtx=buildFullContext(accs,offs);
      } else {
        // اكتشاف الأسئلة العامة أولاً
        var generalPatterns=/(عرض|عروض|offer|offers|deal|deals)/i;
        var accNameInQ=accs.some(function(a){return txt.toLowerCase().includes(a.name.toLowerCase());});
        var isGeneralQ=generalPatterns.test(txt)&&!accNameInQ;
        if(isGeneralQ){
          matched=null;
          activeCtx=buildFullContext(accs,offs);
        } else {
          // Auto detect من آخر رسالتين
          var recentText=hist.slice(-2).map(function(m){return m.t||"";}).join(" ");
          var smart=buildSmartContext(recentText,accs,offs);
          if(!smart.matched){
            var allText=hist.map(function(m){return m.t||"";}).join(" ");
            smart=buildSmartContext(allText,accs,offs);
          }
          matched=smart.matched;
          activeCtx=smart.ctx;
        }
      }

      var lang=detectLang(txt);
      if(lang==="en")activeCtx+=("\n\nIMPORTANT: User is writing in English, reply in English.");

      // Smart typing delay based on question length
      var delay=Math.min(400+txt.length*8,1200);
      await new Promise(function(r){setTimeout(r,delay);});

      // More tokens if asking about offers
      var isOfferQ=/(عرض|عروض|offer|deal|اللي عندكم|منيو|menu|اسعار|سعر|price)/i.test(txt);
      // لو الأكونت اتغير عن آخر رسالة — ابعت history أقل عشان ميشيلش context قديم
      var prevText=hist.slice(-4,-1).map(function(m){return m.t||"";}).join(" ");
      var prevSmart=buildSmartContext(prevText,accs,offs);
      var topicChanged=matched&&prevSmart.matched&&matched.id!==prevSmart.matched.id;
      var histSlice=topicChanged?hist.slice(-1):hist.slice(-3);
      const reply=await askGemini(activeCtx,histSlice.map(m=>({r:m.r,t:m.t})),isOfferQ?1000:500);

      // Validate reply - check for hallucinated phone numbers not in context
      var cleanReply=reply;
      var replyNums=(reply.match(/\d{7,}/g)||[]);
      var ctxNums=(activeCtx.match(/\d{7,}/g)||[]);
      var hasHallucination=replyNums.some(function(n){return !ctxNums.includes(n);});
      if(hasHallucination){
        // Replace with safe fallback
        cleanReply="المعلومة دي مش متاحة عندي. تواصل مع الأدمن مباشرة للتأكيد.";
        if(matched&&matched.contactReply){
          cleanReply+="\n"+matched.contactReply;
        }
      }

      // Detect unanswered questions
      var unansweredMatch=cleanReply.match(/\[UNANSWERED\]\s*(.+)/);
      if(unansweredMatch){
        var uq=unansweredMatch[1].trim();
        var isNew=true;
        setUnanswered(p=>{
          if(p.find(function(x){return x.q===uq;})){isNew=false;return p;}
          return [...p,{q:uq,a:""}];
        });
        if(isNew){
          var accName=matched?matched.name:"عام";
          saveUnansweredToFB(uq,accName,lockedAcc?lockedAcc.id:"");
        }
        cleanReply="عذراً، المعلومة دي مش متاحة عندي دلوقتي. هيتم إبلاغ الأدمن وهيرد عليك قريب! 🙏";
        if(matched&&matched.contactReply){
          cleanReply+="\n\nللتواصل المباشر:\n"+matched.contactReply;
        }
      }

      // Add WhatsApp button if reply mentions contact info
      var hasContact=(cleanReply.includes("واتساب")||cleanReply.includes("تواصل")||cleanReply.includes("WhatsApp"));
      if(hasContact&&matched&&matched.contactReply){
        var waNum=(matched.contactReply.match(/\d{7,}/)||[])[0];
        if(waNum)cleanReply=cleanReply+"\n\`\`\`wa:"+waNum+"\`\`\`";
      }

      setTyping(false);
      setMsgs([...hist,{r:"ai",t:cleanReply}]);
    }catch(e){
      setTyping(false);
      var errMsg=e.message||"";
      var fallback;
      if(errMsg.includes("rate")||errMsg.includes("quota")){
        fallback="⏳ في ضغط دلوقتي! استنى ثانية وجرب تاني.";
      } else {
        fallback="❌ في مشكلة في الاتصال. تواصل معنا مباشرة على واتساب 👇\nhttps://wa.me/"+WA;
      }
      setMsgs([...hist,{r:"ai",t:fallback}]);
    }
    setLoading(false);
  }

  async function wizardExec(type, data){
    if(type==="add_offer"){
      var acc=accs.find(function(a){return a.id===data.accountId;});
      if(!acc)return;
      var id="off_"+Date.now();
      var fb=window.__fb;
      await fb.setDoc(fb.doc(fb.db,"offers",id),{
        id:id,accountId:data.accountId,title:data.title||"",
        description:data.description||"",content:data.content||"",
        image:"",link:"",expiryDate:data.expiryDate||"",
        badge:data.badge||"جديد",updatedAt:new Date().toISOString()
      });
      setMsgs(function(p){return [...p,{r:"ai",t:"✅ تم إضافة العرض: "+data.title+" لـ "+acc.name}];});
      window.showLocalNotif("🎁 عرض جديد!","تم إضافة: "+data.title+" لـ "+acc.name);
      logActivity("add_offer","إضافة عرض: "+data.title,"الأكونت: "+acc.name);
      setWizard(null);
    }
    else if(type==="delete_offer"){
      var off=offs.find(function(o){return o.id===data.offerId;});
      var fb=window.__fb;
      await fb.deleteDoc(fb.doc(fb.db,"offers",data.offerId));
      setMsgs(function(p){return [...p,{r:"ai",t:"🗑️ تم حذف العرض: "+(off?off.title:"")}];});
      setWizard(null);
    }
    else if(type==="edit_offer"){
      var off2=offs.find(function(o){return o.id===data.offerId;});
      if(!off2)return;
      var fb=window.__fb;
      var updated=Object.assign({},off2,data.changes,{updatedAt:new Date().toISOString()});
      await fb.setDoc(fb.doc(fb.db,"offers",off2.id),updated);
      setMsgs(function(p){return [...p,{r:"ai",t:"✅ تم تعديل العرض: "+off2.title}];});
      setWizard(null);
    }
    else if(type==="add_info"){
      var acc5=accs.find(function(a){return a.id===data.accountId;});
      if(!acc5)return;
      var existing5=(acc5.trainedQA||[]);
      var isDup5=existing5.find(function(x){return x.q&&x.q.trim()===(data.question||"").trim();});
      var newQA5=isDup5
        ? existing5.map(function(x){return x.q.trim()===data.question.trim()?{q:x.q,a:data.answer}:x;})
        : [...existing5,{q:data.question,a:data.answer}];
      var updated5=Object.assign({},acc5,{trainedQA:newQA5,updatedAt:new Date().toISOString()});
      var fb=window.__fb;
      await fb.setDoc(fb.doc(fb.db,"accounts",acc5.id),updated5);
      setMsgs(function(p){return [...p,{r:"ai",t:"✅ تم إضافة المعلومة لـ "+acc5.name}];});
      setWizard(null);
    }
    else if(type==="edit_acc"){
      var acc2=accs.find(function(a){return a.id===data.accountId;});
      if(!acc2)return;
      var fb=window.__fb;
      var updated2=Object.assign({},acc2,data.changes,{updatedAt:new Date().toISOString()});
      await fb.setDoc(fb.doc(fb.db,"accounts",acc2.id),updated2);
      setMsgs(function(p){return [...p,{r:"ai",t:"✅ تم تعديل بيانات: "+acc2.name}];});
      setWizard(null);
    }
  }

function WAField({user}){
  const fb=window.__fb;
  const[wa,setWa]=useState("");
  const[editing,setEditing]=useState(false);
  const[saving,setSaving]=useState(false);

  React.useEffect(function(){
    if(!fb||!user)return;
    fb.getDoc(fb.doc(fb.db,"user_data",user.uid)).then(function(d){
      if(d.exists()&&d.data().whatsapp)setWa(d.data().whatsapp);
    }).catch(function(){});
  },[user?.uid]);

  async function save(){
    if(!wa.trim()){return;}
    setSaving(true);
    try{
      var num=wa.trim().replace(/^0/,"20").replace(/[^0-9]/g,"");
      await fb.setDoc(fb.doc(fb.db,"user_data",user.uid),{whatsapp:num},{merge:true});
      setWa(num);
      setEditing(false);
      if(typeof msg==="function")msg("✅ تم حفظ رقم الواتساب");
    }catch(e){}
    setSaving(false);
  }

  return(
    <div style={{marginBottom:".75rem"}}>
      <div style={{fontSize:".65rem",color:"var(--dim)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:".5rem",paddingRight:".2rem"}}>الواتساب</div>
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:".85rem 1.1rem",display:"flex",alignItems:"center",gap:".75rem"}}>
        <span style={{fontSize:"1.2rem",flexShrink:0}}>📱</span>
        <div style={{flex:1,minWidth:0}}>
          {editing?(
            <input
              type="tel"
              value={wa}
              onChange={e=>setWa(e.target.value.replace(/[^0-9+]/g,""))}
              placeholder="01XXXXXXXXX"
              autoFocus
              onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}}
              style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid rgba(212,165,116,.4)",color:"var(--text)",fontFamily:"'Cairo',sans-serif",fontSize:".9rem",outline:"none",paddingBottom:".2rem",direction:"ltr"}}
            />
          ):(
            <div style={{fontSize:".88rem",fontWeight:600,color:wa?"var(--text)":"var(--dim)"}}>
              {wa||"لم يتم إضافة رقم بعد"}
            </div>
          )}
        </div>
        {editing?(
          <div style={{display:"flex",gap:".35rem",flexShrink:0}}>
            <button onClick={save} disabled={saving} style={{padding:".3rem .7rem",borderRadius:8,border:"none",background:"var(--hl)",color:"#0a0a0a",fontFamily:"'Cairo',sans-serif",fontWeight:700,fontSize:".75rem",cursor:"pointer"}}>
              {saving?"...":"حفظ"}
            </button>
            <button onClick={()=>setEditing(false)} style={{padding:".3rem .7rem",borderRadius:8,border:"1px solid var(--border)",background:"transparent",color:"var(--dim)",fontFamily:"'Cairo',sans-serif",fontSize:".75rem",cursor:"pointer"}}>إلغاء</button>
          </div>
        ):(
          <button onClick={()=>setEditing(true)} style={{flexShrink:0,background:"rgba(212,165,116,.08)",border:"1px solid rgba(212,165,116,.2)",color:"var(--hl)",padding:".3rem .7rem",borderRadius:8,fontFamily:"'Cairo',sans-serif",fontSize:".75rem",fontWeight:600,cursor:"pointer"}}>
            {wa?"تعديل":"إضافة"}
          </button>
        )}
      </div>
    </div>
  );
}

function SwitchAccounts({user,onSwitch,onViewChange}){
  const fb=window.__fb;
  const[saved,setSaved]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("rb_saved_accounts")||"[]");}
    catch(e){return[];}
  });
  const[switching,setSwitching]=useState(null); // uid being switched to

  // Auto-save current Google account
  React.useEffect(function(){
    if(!user)return;
    var current={
      uid:user.uid,
      displayName:user.displayName||"",
      email:user.email||"",
      photoURL:user.photoURL||"",
      type:"google"
    };
    setSaved(function(prev){
      var exists=prev.find(function(a){return a.uid===user.uid;});
      var next=exists
        ?prev.map(function(a){return a.uid===user.uid?current:a;})
        :[...prev.filter(function(a){return a.uid!==user.uid;}),current];
      try{localStorage.setItem("rb_saved_accounts",JSON.stringify(next));}catch(e){}
      return next;
    });
  },[user?.uid]);

  // Auto-save admin account
  React.useEffect(function(){
    var pw=null;
    try{pw=localStorage.getItem("rb_admin_pw");}catch(e){}
    if(!pw)return;
    setSaved(function(prev){
      var exists=prev.find(function(a){return a.uid==="__admin__";});
      if(exists)return prev;
      var next=[...prev,{uid:"__admin__",displayName:"الأدمن",email:"",photoURL:"",type:"admin",adminPw:pw}];
      try{localStorage.setItem("rb_saved_accounts",JSON.stringify(next));}catch(e){}
      return next;
    });
  },[]);

  async function addAccount(){
    try{
      // Sign out current user first
      if(user) await fb.signOut(fb.auth);
      try{localStorage.removeItem("rb_admin_pw");}catch(e){}
      // Open Google popup to add new account
      await fb.signInWithPopup(fb.auth,fb.googleProvider);
    }catch(e){
      msg("❌ "+e.message);
    }
  }

  async function switchTo(acc){
    if(switching)return;
    setSwitching(acc.uid);
    try{
      if(acc.type==="admin"){
        if(user) await fb.signOut(fb.auth);
        var doc=await fb.getDoc(fb.doc(fb.db,"settings","admin"));
        var correctPw=doc.exists()&&doc.data().password?doc.data().password:window.__ADMIN_DEFAULT||"fares2388";
        if(acc.adminPw===correctPw){
          try{localStorage.setItem("rb_admin_pw",acc.adminPw);}catch(e){}
          window.location.reload();
        } else {
          msg("❌ انتهت صلاحية جلسة الأدمن — ادخل الباسورد تاني");
          removeAccount("__admin__");
        }
      } else {
        if(user&&user.uid===acc.uid){msg("أنت بالفعل في هذا الأكونت");setSwitching(null);return;}
        if(user) await fb.signOut(fb.auth);
        try{localStorage.removeItem("rb_admin_pw");}catch(e){}
        await fb.signInWithPopup(fb.auth,fb.googleProvider);
      }
    }catch(e){msg("❌ "+e.message);}
    setSwitching(null);
  }

  function removeAccount(uid,e){
    if(e)e.stopPropagation();
    setSaved(function(prev){
      var next=prev.filter(function(a){return a.uid!==uid;});
      try{localStorage.setItem("rb_saved_accounts",JSON.stringify(next));}catch(e){}
      return next;
    });
  }

  var currentUid=user?user.uid:"";
  var others=saved.filter(function(a){return a.uid!==currentUid;});

  return(
    <div style={{marginBottom:".75rem"}}>
      <div style={{fontSize:".65rem",color:"var(--dim)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:".5rem",paddingRight:".2rem"}}>الأكونتات</div>
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,overflow:"hidden"}}>

        {/* Current account */}
        {user&&(
          <div style={{padding:".8rem 1.1rem",display:"flex",alignItems:"center",gap:".75rem",background:"rgba(212,165,116,.04)",borderBottom:others.length>0||true?"1px solid var(--border)":"none"}}>
            <div style={{width:38,height:38,borderRadius:"50%",overflow:"hidden",border:"2px solid rgba(212,165,116,.4)",flexShrink:0}}>
              {user.photoURL
                ?<img src={user.photoURL} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                :<div style={{width:"100%",height:"100%",background:"rgba(212,165,116,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".9rem"}}>👤</div>
              }
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:".88rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.displayName||user.email}</div>
              <div style={{fontSize:".65rem",color:"#4ade80",display:"flex",alignItems:"center",gap:".25rem"}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:"#4ade80",display:"inline-block"}}/>
                الأكونت الحالي
              </div>
            </div>
          </div>
        )}

        {/* Saved accounts */}
        {others.map(function(acc,i){
          var isLoading=switching===acc.uid;
          return(
            <div key={acc.uid} onClick={()=>switchTo(acc)}
              style={{padding:".8rem 1.1rem",display:"flex",alignItems:"center",gap:".75rem",cursor:"pointer",borderBottom:"1px solid var(--border)",opacity:isLoading?.6:1,transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.04)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="transparent";}}>
              <div style={{width:38,height:38,borderRadius:"50%",overflow:"hidden",border:"1.5px solid var(--border)",flexShrink:0}}>
                {acc.photoURL
                  ?<img src={acc.photoURL} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                  :<div style={{width:"100%",height:"100%",background:"rgba(255,255,255,.05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem"}}>{acc.type==="admin"?"🔐":"👤"}</div>
                }
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:".88rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{acc.displayName||acc.email||"أكونت محفوظ"}</div>
                <div style={{fontSize:".65rem",color:"var(--dim)"}}>{isLoading?"جاري التبديل...":acc.type==="admin"?"أدمن — اضغط للتبديل":"اضغط للتبديل"}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:".35rem",flexShrink:0}}>
                {isLoading
                  ?<div style={{width:18,height:18,borderRadius:"50%",border:"2px solid rgba(212,165,116,.3)",borderTop:"2px solid var(--hl)",animation:"spin .7s linear infinite"}}/>
                  :<span style={{fontSize:"1rem",color:"var(--dim)"}}>⇄</span>
                }
                <button onClick={e=>{e.stopPropagation();removeAccount(acc.uid);}}
                  style={{background:"none",border:"none",color:"rgba(239,68,68,.35)",fontSize:".85rem",cursor:"pointer",padding:".15rem .3rem",lineHeight:1,borderRadius:4}}
                  onMouseEnter={e=>{e.target.style.color="#f87171";}}
                  onMouseLeave={e=>{e.target.style.color="rgba(239,68,68,.35)";}}>✕</button>
              </div>
            </div>
          );
        })}

        {/* Add Google account */}
        <div onClick={addAccount}
          style={{padding:".75rem 1.1rem",display:"flex",alignItems:"center",gap:".75rem",cursor:"pointer",transition:"background .15s",borderBottom:"1px solid var(--border)"}}
          onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.03)";}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";}}>
          <div style={{width:38,height:38,borderRadius:"50%",border:"1.5px dashed rgba(255,255,255,.18)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--dim)",fontSize:"1.2rem",fontWeight:300}}>+</div>
          <div>
            <div style={{fontWeight:600,fontSize:".88rem",color:"var(--text)"}}>إضافة أكونت Google</div>
            <div style={{fontSize:".65rem",color:"var(--dim)"}}>سجّل بـ Google</div>
          </div>
        </div>
        {/* Add Admin account */}
        <div onClick={()=>onViewChange("admin_login")}
          style={{padding:".75rem 1.1rem",display:"flex",alignItems:"center",gap:".75rem",cursor:"pointer",transition:"background .15s"}}
          onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.03)";}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";}}>
          <div style={{width:38,height:38,borderRadius:"50%",border:"1.5px dashed rgba(212,165,116,.3)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem"}}>🔐</div>
          <div>
            <div style={{fontWeight:600,fontSize:".88rem",color:"var(--hl)"}}>دخول كأدمن</div>
            <div style={{fontSize:".65rem",color:"var(--dim)"}}>حط كلمة المرور</div>
          </div>
        </div>
      </div>
    </div>
  );
}


function ProfilePage({user,favorites,accs,theme,onTheme,onSignOut,onToggleFav,onViewChange}){
  const myFavAccs=accs.filter(a=>favorites.includes(a.id));
  const[notifStatus,setNotifStatus]=useState(
    !("Notification" in window)?"not-supported":Notification.permission
  );
  const[savingWA,setSavingWA]=useState(false);
  const[waVal,setWaVal]=useState("");
  const fb=window.__fb;

  async function handleNotif(){
    if(notifStatus==="granted"){msg("⚙️ افتح إعدادات الجهاز لإيقاف الإشعارات");return;}
    if(notifStatus==="denied"){
      var isIOS=/iPhone|iPad/.test(navigator.userAgent);
      msg(isIOS?"⚙️ الإعدادات ← Safari ← الإشعارات":"⚙️ إعدادات الجهاز ← التطبيقات ← المتصفح ← الإشعارات");
      return;
    }
    try{
      const p=await Notification.requestPermission();
      setNotifStatus(p);
      if(p==="granted"){
        typeof window.registerFCMToken==="function"&&await window.registerFCMToken();
        if(window.listenToNotifications)window.listenToNotifications();
        msg("🔔 تم تفعيل الإشعارات!");
      }
    }catch(e){}
  }

  return(
    <div style={{minHeight:"100vh",background:"var(--primary)"}}>
      {/* Header with gradient */}
      <div style={{background:"linear-gradient(135deg,rgba(212,165,116,.12),rgba(212,165,116,.03))",borderBottom:"1px solid var(--border)",padding:"2rem 1.4rem 1.5rem",paddingTop:"calc(2rem + var(--safe-top))"}}>
        <div style={{display:"flex",alignItems:"center",gap:"1rem",maxWidth:480,margin:"0 auto"}}>
          <div style={{width:64,height:64,borderRadius:"50%",overflow:"hidden",border:"2.5px solid rgba(212,165,116,.5)",flexShrink:0,boxShadow:"0 0 20px rgba(212,165,116,.2)"}}>

            }
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.15rem",fontWeight:700,color:"var(--text)"}}>{user?user.displayName||"مرحباً":"زائر"}</div>
            {user&&<div style={{fontSize:".72rem",color:"var(--dim)",marginTop:".2rem"}}>{user.email}</div>}
            {!user&&<div style={{fontSize:".75rem",color:"var(--hl)",marginTop:".2rem"}}>سجّل دخول للوصول لكل المميزات</div>}
          </div>
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"1.2rem 1.1rem",paddingBottom:"6rem"}}>

        {/* Notifications */}

            <div style={{padding:".9rem 1.1rem",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"1rem"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:".88rem",marginBottom:".2rem"}}>إشعارات العروض والتحديثات</div>
                <div style={{fontSize:".7rem",color:notifStatus==="granted"?"#4ade80":notifStatus==="denied"?"#f87171":"var(--dim)"}}>
                  {notifStatus==="granted"?"✅ مفعّلة":notifStatus==="denied"?"❌ محجوبة":notifStatus==="not-supported"?"غير مدعوم":"⏸ غير مفعّلة"}

              </div>
              <button onClick={handleNotif} style={{flexShrink:0,padding:".45rem 1rem",borderRadius:20,border:`1px solid ${notifStatus==="granted"?"rgba(74,222,128,.3)":"rgba(212,165,116,.3)"}`,background:notifStatus==="granted"?"rgba(74,222,128,.06)":"rgba(212,165,116,.06)",color:notifStatus==="granted"?"#4ade80":"var(--hl)",fontFamily:"'Cairo',sans-serif",fontSize:".75rem",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>

          </div>
        </div>

        {/* WhatsApp */}
        {user&&<WAField user={user}/>}

        {/* Theme */}
        <div style={{marginBottom:".75rem"}}>
          <div style={{fontSize:".65rem",color:"var(--dim)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:".5rem",paddingRight:".2rem"}}>المظهر</div>

                <span>{t.icon}</span><span>{t.label}</span>

              </button>

          </div>
        </div>

        {/* Favorites */}
        <div style={{marginBottom:".75rem"}}>

            <div style={{fontSize:".65rem",color:"var(--dim)",letterSpacing:".1em",textTransform:"uppercase"}}>المفضلة</div>
            <span style={{fontSize:".68rem",color:"var(--hl)",background:"rgba(212,165,116,.08)",border:"1px solid rgba(212,165,116,.18)",padding:".1rem .45rem",borderRadius:20}}>{myFavAccs.length} أكونت</span>
          </div>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,overflow:"hidden"}}>
            {myFavAccs.length===0?(
              <div style={{padding:"1.5rem",textAlign:"center",color:"var(--dim)"}}>
                <div style={{fontSize:"1.6rem",marginBottom:".3rem"}}>⭐</div>
                <div style={{fontSize:".8rem"}}>اضغط ⭐ على أي أكونت</div>
              </div>
            ):(
              <div>
                {myFavAccs.map((a,i)=>(
                  <div key={a.id} style={{display:"flex",alignItems:"center",gap:".8rem",padding:".75rem 1.1rem",borderBottom:i<myFavAccs.length-1?"1px solid var(--border)":"none"}}>
                    {a.avatar?<img src={a.avatar} style={{width:38,height:38,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"1.5px solid rgba(212,165,116,.25)"}} alt=""/>:<div style={{width:38,height:38,borderRadius:"50%",background:"rgba(212,165,116,.08)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:".9rem"}}>🏪</div>}

                      <div style={{fontWeight:600,fontSize:".85rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</div>

                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* تقسيمتي */}
        {user&&(
          <div style={{marginBottom:".75rem"}}>
            <div style={{fontSize:".65rem",color:"var(--dim)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:".5rem",paddingRight:".2rem"}}>الفريق</div>

              <span style={{color:"var(--dim)",fontSize:".9rem"}}>←</span>
            </button>
          </div>
        )}

        {/* Switch Accounts */}
        <SwitchAccounts user={user} onSwitch={onSignOut} onViewChange={onViewChange}/>

        {/* Sign in / Sign out */}
        <div style={{marginTop:".75rem"}}>
          {user?(
            <button onClick={onSignOut} style={{width:"100%",padding:".9rem",borderRadius:14,border:"1px solid rgba(239,68,68,.2)",background:"rgba(239,68,68,.04)",color:"#f87171",fontFamily:"'Cairo',sans-serif",fontWeight:700,fontSize:".9rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem",transition:"all .18s"}}

              <span>تسجيل الدخول بـ Google</span>
            </button>
          )}
        </div>

        <div style={{textAlign:"center",marginTop:"2rem"}}><div className="made-by" style={{fontSize:".7rem"}}>Made by Fares Akram</div></div>
      </div>
    </div>
  );
}

  const previewAccs=accs.filter(a=>a.status==="نشط").slice(0,3);

  // Tagline typewriter
  const TAGLINES=["الردود الجاهزة في ثانية ⚡","كل أكونت في مكان واحد 📁","العروض دايماً محدثة 🎁","شير مع فريقك بلينك واحد 🔗"];
  const[tagIdx,setTagIdx]=React.useState(0);
  const[tagText,setTagText]=React.useState("");
  const[typing,setTyping]=React.useState(true);
  React.useEffect(()=>{
    const full=TAGLINES[tagIdx];
    if(typing){
      if(tagText.length<full.length){const t=setTimeout(()=>setTagText(full.slice(0,tagText.length+1)),60);return()=>clearTimeout(t);}

  function remove(i){onChange((replies||[]).filter((_,idx)=>idx!==i));}

    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:".5rem"}}>

function MineTab({user,accs,onOpenProfile,onShare,onTagClick,onFav,favs}){
  const[myAccs,setMyAccs]=useState([]);
  const[loading,setLoading]=useState(true);
  const[taqseemDate,setTaqseemDate]=useState("");
  const fb=window.__fb;

  React.useEffect(function(){
    if(!fb||!user)return;
    var today=new Date().toISOString().slice(0,10);
    // Try today's taqseem first
    fb.getDoc(fb.doc(fb.db,"taqseem",today)).then(function(d){
      if(d.exists()&&d.data().parsed){
        var parsed=d.data().parsed;
        var uName=(user.displayName||user.email||"").toLowerCase();
        var myEntry=parsed.find(function(p){
          return p.person&&uName.includes(p.person.toLowerCase());
        });
        if(myEntry&&myEntry.accIds&&myEntry.accIds.length>0){
          var mine=accs.filter(function(a){return myEntry.accIds.includes(a.id);});
          setMyAccs(mine);
          setTaqseemDate(d.data().date||today);
          setLoading(false);
          return;
        }
      }
      // Fallback: assignedTo field
      var uName=(user.displayName||user.email||"").toLowerCase();
      var mine=accs.filter(function(a){
        return a.assignedTo&&uName.includes(a.assignedTo.toLowerCase());
      });
      setMyAccs(mine);
      setLoading(false);
    }).catch(function(){
      setLoading(false);
    });
  },[user,accs]);

  if(loading)return <div style={{padding:"2rem",textAlign:"center",color:"var(--dim)"}}>جاري التحميل...</div>;

  return(
    <div className="page-enter">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.2rem",flexWrap:"wrap",gap:".5rem"}}>
        <div>
          <div style={{fontSize:".9rem",fontWeight:700}}>أكونتاتك يا {user.displayName?.split(" ")[0]||"صديقي"} 👋</div>
          {taqseemDate&&<div style={{fontSize:".68rem",color:"var(--hl)",marginTop:".15rem"}}>تقسيمة {taqseemDate}</div>}
        </div>
        <span style={{fontSize:".68rem",color:"var(--dim)",background:"rgba(255,255,255,.04)",padding:".2rem .6rem",borderRadius:20,border:"1px solid var(--border)"}}>{myAccs.length} أكونت</span>
      </div>
      {myAccs.length===0?(
        <div style={{textAlign:"center",padding:"3rem",color:"var(--dim)"}}>
          <div style={{fontSize:"2.5rem",marginBottom:".8rem"}}>📭</div>
          <div style={{fontSize:".9rem",marginBottom:".4rem"}}>مفيش تقسيمة لحد دلوقتي</div>
          <div style={{fontSize:".75rem"}}>الأدمن لسه محددش التقسيمة النهارده</div>
        </div>
      ):(
        <div className="grid-cards" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(280px,100%),1fr))",gap:"1rem"}}>
          {myAccs.map(function(a){return(
            <AccCard key={a.id} a={a} onClick={()=>onOpenProfile(a)} onShare={onShare} onTagClick={onTagClick} onFav={onFav} isFav={favs&&favs.includes(a.id)}/>
          );})}
        </div>
      )}
    </div>
  );
}

function TextTaqseem({accs,users,onApply}){
  const[text,setText]=useState("");
  const[preview,setPreview]=useState([]);
  const[err,setErr]=useState([]);

  function parse(txt){
    if(!txt.trim()){setPreview([]);setErr([]);return;}
    var lines=txt.split("\n").filter(function(l){return l.trim();});
    var result=[];
    var errors=[];
    lines.forEach(function(line){
      // match: اسم (أكونت1 - أكونت2) or اسم (أكونت1، أكونت2)
      var m=line.match(/^([^(（]+)[（(]([^)）]+)[)）]/);
      if(!m){if(line.trim())errors.push("سطر مش متعرف: "+line.trim());return;}
      var personName=m[1].trim();
      var accNames=m[2].split(/[-–,،]+/).map(function(n){return n.trim();}).filter(Boolean);
      // match person to user
      var matchedUser=users.find(function(u){
        var nick=(u.nickname||u.displayName||"").toLowerCase();
        return nick&&(nick.includes(personName.toLowerCase())||personName.toLowerCase().includes(nick));
      });
      var matchedAccs=accNames.map(function(n){
        var found=accs.find(function(a){
          return a.name&&(a.name.toLowerCase().includes(n.toLowerCase())||n.toLowerCase().includes(a.name.toLowerCase().slice(0,4)));
        });
        return {input:n,acc:found||null};
      });
      var notFound=matchedAccs.filter(function(x){return !x.acc;});
      if(notFound.length>0)errors.push("مش لاقي: "+notFound.map(function(x){return x.input;}).join(", ")+" ("+personName+")");
      result.push({personName,user:matchedUser||null,accs:matchedAccs});
    });
    setPreview(result);
    setErr(errors);
  }

  function apply(){
    var newAssign={};
    preview.forEach(function(p){
      if(!p.user)return;
      newAssign[p.user.uid]=(p.accs||[]).filter(function(x){return x.acc;}).map(function(x){return x.acc.id;});
    });
    onApply(newAssign);
  }

  return(
    <div>
      <div style={{fontSize:".72rem",color:"var(--dim)",marginBottom:".5rem",lineHeight:1.8}}>
        اكتب التقسيمة — كل سطر: <span style={{color:"var(--hl)",fontFamily:"monospace"}}>اسم اليوزر (أكونت1 - أكونت2 - أكونت3)</span>
      </div>
      <textarea
        value={text}
        onChange={function(e){setText(e.target.value);parse(e.target.value);}}
        placeholder={"فارس (بكري - تشيليز - ابن مصر - المرسي - dr fish - فرغلي)\nنسمة (ميني طنط - أوسطا - الطيب - صابر - وليمة - الياسمين)\nمنه (سلطعون - العمدة - السلطان - ابن مصر - سرحان - شبراوي)\nسلوى (بيت المشويات - شيخ البلد - الأصدقاء - فود - طنط)"}
        style={{width:"100%",minHeight:150,padding:".8rem 1rem",borderRadius:10,border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.03)",color:"var(--text)",fontFamily:"'Cairo',sans-serif",fontSize:".85rem",direction:"rtl",resize:"vertical",lineHeight:1.9,marginBottom:".8rem"}}
      />

      {/* Errors */}
      {err.length>0&&(
        <div style={{marginBottom:".7rem",padding:".6rem .9rem",background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.2)",borderRadius:8}}>
          {err.map(function(e,i){return <div key={i} style={{fontSize:".72rem",color:"#f87171"}}>⚠️ {e}</div>;})}
        </div>
      )}

      {/* Preview */}
      {preview.length>0&&(
        <div style={{marginBottom:".8rem",display:"grid",gap:".4rem"}}>
          {preview.map(function(p,i){return(
            <div key={i} style={{background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.07)",borderRadius:8,padding:".6rem .9rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:".35rem"}}>
                <span style={{fontWeight:700,fontSize:".85rem",color:p.user?"var(--text)":"#f87171"}}>{p.personName}</span>
                {p.user?<span style={{fontSize:".62rem",color:"#4ade80",background:"rgba(74,222,128,.08)",padding:".1rem .4rem",borderRadius:10}}>✓ {p.user.nickname||p.user.displayName}</span>
                :<span style={{fontSize:".62rem",color:"#f87171",background:"rgba(239,68,68,.08)",padding:".1rem .4rem",borderRadius:10}}>❌ مش لاقي اليوزر</span>}

function TaqseemPanel({accs}){
  const fb=window.__fb;
  const today=new Date().toISOString().slice(0,10);

  const[users,setUsers]=useState([]);       // [{uid,displayName,nickname,email,whatsapp}]
  const[assign,setAssign]=useState({});     // {uid: [accId,...]}
  const[saved,setSaved]=useState(false);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[editNick,setEditNick]=useState(null); // uid being edited
  const[nickVal,setNickVal]=useState("");
  const[search,setSearch]=useState("");
  const[mode,setMode]=useState("visual"); // visual | text

  // Load users + today's taqseem
  React.useEffect(function(){
    if(!fb)return;
    Promise.all([
      fb.getDocs(fb.collection(fb.db,"user_data")),
      fb.getDocs(fb.collection(fb.db,"fcm_tokens")),
      fb.getDoc(fb.doc(fb.db,"taqseem",today))
    ]).then(function(res){
      // merge user data
      var ud={}, td={};
      res[0].docs.forEach(function(d){if(d.data().uid)ud[d.data().uid]=d.data();});
      res[1].docs.forEach(function(d){if(d.data().uid)td[d.data().uid]=d.data();});
      var uids=[...new Set([...Object.keys(ud),...Object.keys(td)])];
      var list=uids.map(function(uid){
        var u=Object.assign({},td[uid]||{},ud[uid]||{});
        return {uid,displayName:u.displayName||"",nickname:u.nickname||u.displayName||"",email:u.email||"",whatsapp:u.whatsapp||""};
      }).filter(function(u){return u.uid;});
      setUsers(list);
      // load saved taqseem
      if(res[2].exists()&&res[2].data().assignMap){
        setAssign(res[2].data().assignMap);
        setSaved(true);
      }
      setLoading(false);
    }).catch(function(){setLoading(false);});
  },[]);

  function toggleAcc(uid,accId){
    setAssign(function(prev){
      var cur=prev[uid]||[];
      var next=cur.includes(accId)?cur.filter(function(x){return x!==accId;}):[...cur,accId];
      return Object.assign({},prev,{[uid]:next});
    });
    setSaved(false);
  }

  async function saveNickname(uid){
    if(!nickVal.trim())return;
    try{
      await fb.setDoc(fb.doc(fb.db,"user_data",uid),{nickname:nickVal.trim()},{merge:true});
      setUsers(function(prev){return prev.map(function(u){return u.uid===uid?Object.assign({},u,{nickname:nickVal.trim()}):u;});});
      setEditNick(null);
    }catch(e){msg("❌ "+e.message);}
  }

  async function saveTaqseem(){
    setSaving(true);
    try{
      // build parsed array for MineTab
      var parsed=users.map(function(u){
        return {person:u.nickname||u.displayName,uid:u.uid,accIds:assign[u.uid]||[]};
      }).filter(function(p){return p.accIds.length>0;});
      await fb.setDoc(fb.doc(fb.db,"taqseem",today),{
        assignMap:assign,
        parsed:parsed,
        date:today,
        updatedAt:new Date().toISOString()
      });
      setSaved(true);
    }catch(e){msg("❌ "+e.message);}
    setSaving(false);
  }

  async function clearTaqseem(){
    if(!window.confirm("تأكيد مسح التقسيمة؟"))return;
    try{
      await fb.deleteDoc(fb.doc(fb.db,"taqseem",today));
      setAssign({});setSaved(false);
    }catch(e){}
  }

  // unassigned accs
  var assignedAll=[].concat(...Object.values(assign));
  var unassigned=accs.filter(function(a){return !assignedAll.includes(a.id);});
  var filteredAccs=search.trim()?accs.filter(function(a){return a.name&&a.name.includes(search);}):accs;

  if(loading)return <div style={{padding:"2rem",textAlign:"center",color:"var(--dim)"}}>جاري التحميل...</div>;

    <div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem",flexWrap:"wrap",gap:".5rem"}}>

          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1rem"}}>تقسيمة اليوم</div>
          <div style={{fontSize:".68rem",color:"var(--dim)",marginTop:".1rem"}}>بتتمسح تلقائياً كل يوم الساعة 1 الصبح ·
            <span style={{color:"#fbbf24",marginRight:".3rem"}}>{unassigned.length} أكونت مش متوزعة</span>
          </div>
        </div>
        <div style={{display:"flex",gap:".4rem",alignItems:"center",flexWrap:"wrap"}}>
          {saved&&<span style={{fontSize:".65rem",color:"#4ade80",background:"rgba(74,222,128,.08)",border:"1px solid rgba(74,222,128,.2)",padding:".18rem .55rem",borderRadius:20}}>✓ محفوظة</span>}
          {Object.keys(assign).length>0&&<button onClick={clearTaqseem} style={{padding:".3rem .7rem",borderRadius:8,border:"1px solid rgba(239,68,68,.25)",background:"rgba(239,68,68,.06)",color:"#f87171",fontFamily:"'Cairo',sans-serif",fontSize:".72rem",cursor:"pointer"}}>مسح</button>}
          {/* Mode switch */}
          <div style={{display:"flex",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,overflow:"hidden"}}>
            <button onClick={()=>setMode("visual")} style={{padding:".3rem .7rem",border:"none",background:mode==="visual"?"var(--hl)":"transparent",color:mode==="visual"?"#0a0a0a":"var(--dim)",fontFamily:"'Cairo',sans-serif",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>⊞ مرئي</button>
            <button onClick={()=>setMode("text")} style={{padding:".3rem .7rem",border:"none",background:mode==="text"?"var(--hl)":"transparent",color:mode==="text"?"#0a0a0a":"var(--dim)",fontFamily:"'Cairo',sans-serif",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>✏️ نص</button>
            {mode==="visual"&&Object.keys(assign).length>0&&<span style={{fontSize:".6rem",color:"var(--dim)",padding:"0 .3rem"}}>تقدر ترجع للنص وتعدل</span>}
          </div>
        </div>
      </div>

      {/* TEXT MODE */}
      {mode==="text"&&(
        <TextTaqseem accs={accs} users={users} onApply={function(newAssign){setAssign(newAssign);setSaved(false);setMode("visual");}}/>
      )}

      {/* VISUAL MODE */}
      {mode==="visual"&&<>

      {/* Search accs */}
      <input
        placeholder="ابحث عن أكونت..."
        value={search}
        onChange={function(e){setSearch(e.target.value);}}
        style={{width:"100%",padding:".5rem .9rem",borderRadius:8,border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.04)",color:"var(--text)",fontFamily:"'Cairo',sans-serif",fontSize:".82rem",marginBottom:"1rem",direction:"rtl"}}
      />

      {/* Users list */}
      {users.length===0?(
        <div style={{textAlign:"center",padding:"2rem",color:"var(--dim)"}}>
          <div style={{fontSize:"2rem",marginBottom:".5rem"}}>👥</div>
          <div>مفيش يوزرز لحد دلوقتي</div>
          <div style={{fontSize:".72rem",marginTop:".3rem"}}>لازم حد يعمل Google Login الأول</div>
        </div>
      ):(
        <div style={{display:"grid",gap:"1rem"}}>
          {users.map(function(u){
            var myAccIds=assign[u.uid]||[];
            var myAccs=accs.filter(function(a){return myAccIds.includes(a.id);});
            var showAccs=search.trim()?filteredAccs:accs;
            return(
              <div key={u.uid} style={{background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.08)",borderRadius:12,overflow:"hidden"}}>
                {/* User header */}
                <div style={{padding:".75rem 1rem",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:".7rem"}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:"rgba(212,165,116,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0}}>👤</div>
                  <div style={{flex:1,minWidth:0}}>
                    {editNick===u.uid?(
                      <div style={{display:"flex",gap:".35rem",alignItems:"center"}}>
                        <input
                          value={nickVal}

                        />
                        <button onClick={function(){saveNickname(u.uid);}} style={{padding:".28rem .6rem",borderRadius:6,border:"none",background:"var(--hl)",color:"#0a0a0a",fontWeight:700,fontSize:".72rem",fontFamily:"'Cairo',sans-serif",cursor:"pointer"}}>حفظ</button>
                        <button onClick={function(){setEditNick(null);}} style={{padding:".28rem .6rem",borderRadius:6,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"var(--dim)",fontSize:".72rem",fontFamily:"'Cairo',sans-serif",cursor:"pointer"}}>إلغاء</button>

                    );})}
                  </div>

                {/* Checkboxes */}
                <div style={{padding:".5rem 1rem .75rem",display:"flex",flexWrap:"wrap",gap:".3rem"}}>

                      <button key={a.id} onClick={function(){toggleAcc(u.uid,a.id);}} style={{fontSize:".7rem",padding:".2rem .58rem",borderRadius:20,border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.03)",color:taken?"rgba(212,165,116,.4)":"var(--dim)",cursor:"pointer",transition:"all .15s",borderColor:taken?"rgba(212,165,116,.2)":"rgba(255,255,255,.1)"}}

                        {a.name}{taken?" ✓":""}
                      </button>

            );

        </div>
      )}

      {/* Unassigned warning */}
      {unassigned.length>0&&!search&&(
        <div style={{marginTop:"1rem",padding:".6rem .9rem",background:"rgba(251,191,36,.05)",border:"1px solid rgba(251,191,36,.18)",borderRadius:8,fontSize:".72rem",color:"#fbbf24"}}>

    </div>
  );
